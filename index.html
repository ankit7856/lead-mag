y: flex; flex-direction: column; align-items: center; justify-content: center;\n            text-align: center; padding: 8rem 1.5rem 4rem;\n        }\n        .hero-icon {\n            width:5rem; height:5rem; border-radius:50%;\n            border:1px solid rgba(255,255,255,0.10); background:rgba(9,9,11,0.4);\n            display:flex; align-items:center; justify-content:center; overflow:hidden;\n            backdrop-filter:blur(12px); box-shadow:0 0 30px rgba(152,255,217,0.12);\n            margin-bottom:2.5rem;\n        }\n        .hero-icon img { width:2.5rem; height:2.5rem; }\n        .hero h1 {\n            font-size: clamp(2.5rem,6vw,4.5rem); font-weight:800;\n            letter-spacing:-0.03em; line-height:1.05; margin-bottom:1.5rem; max-width:54rem;\n        }\n        .hero h1 em { color:var(--mint); font-style:italic; }\n        .hero .subtitle { color:var(--zinc-400); font-size:1.15rem; max-width:36rem; font-weight:500; line-height:1.6; margin-bottom:4rem; }\n        .scroll-arrow { color:var(--mint); animation:bounce-soft 2.5s ease-in-out infinite; }\n        @keyframes bounce-soft { 0%,100%{transform:translateY(0);} 50%{transform:translateY(8px);} }\n\n        /* ── Layout ── */\n        .content { max-width:48rem; margin:0 auto; padding:0 1.5rem 8rem; }\n        .content-section { margin-bottom:6rem; }\n        .section-tag {\n            display:block; font-size:0.68rem; letter-spacing:0.3em;\n            text-transform:uppercase; color:var(--mint); font-weight:800;\n            margin-bottom:1.75rem; opacity:0.8;\n        }\n        .body-copy { color:var(--zinc-300); font-size:1.1rem; line-height:1.85; }\n        .body-copy p + p { margin-top:1.5rem; }\n        .em-white { color:#fff; font-weight:600; }\n\n        /* ── Glass card ── */\n        .card {\n            background:var(--card-bg); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);\n            border:1px solid var(--border); border-radius:1.5rem; padding:2.5rem;\n        }\n\n        /* ── Red callout ── */\n        .card-red {\n            border-radius:1rem; border:1px solid rgba(255,77,77,0.30);\n            background:rgba(255,77,77,0.05); box-shadow:0 0 32px rgba(255,77,77,0.12);\n            padding:2.25rem; margin-top:2.5rem; position:relative; overflow:hidden;\n        }\n        .card-red::before {\n            content:''; position:absolute; top:0; left:0; right:0; height:1px;\n            background:linear-gradient(to right,transparent,var(--red),transparent); opacity:0.5;\n        }\n        .card-red p { font-size:1.1rem; font-weight:900; color:#fff; line-height:1.5; text-align:center; }\n        .card-red .red-em { color:#ff6b6b; }\n\n        /* ── Mint stat card ── */\n        .card-mint-stat {\n            border:1px solid rgba(152,255,217,0.22); background:var(--card-bg);\n            backdrop-filter:blur(12px); border-radius:1.5rem;\n            padding:2.5rem 3rem; text-align:center; margin:2.5rem 0;\n            box-shadow:0 0 40px rgba(152,255,217,0.07);\n        }\n        .card-mint-stat p { font-size:1.2rem; font-weight:700; color:#fff; line-height:1.65; }\n        .card-mint-stat .mint { color:var(--mint); }\n\n        /* ── Diagram card ── */\n        .card-diagram { background:var(--card-bg); backdrop-filter:blur(12px); border:1px solid var(--border); border-radius:1.5rem; margin-bottom:2.5rem; overflow:hidden; }\n        .diagram-cols { display:grid; grid-template-columns:1fr 1fr; }\n        .diagram-col { display:flex; flex-direction:column; align-items:center; gap:0.75rem; padding:1.75rem 1rem; }\n        .diagram-dot { width:0.75rem; height:0.75rem; border-radius:50%; flex-shrink:0; }\n        .diagram-line { width:2px; flex:1; min-height:2.5rem; }\n        .diagram-label { font-size:0.65rem; font-weight:900; letter-spacing:0.2em; text-transform:uppercase; text-align:center; }\n        .diagram-caption { padding:0.875rem 1.5rem; border-top:1px solid rgba(255,255,255,0.05); text-align:center; color:var(--zinc-500); font-size:0.8rem; }\n\n        /* ── Callouts ── */\n        .callout-white { text-align:center; font-size:1.55rem; font-weight:900; color:#fff; margin:2.5rem 0; line-height:1.3; }\n        .callout-mint  { text-align:center; font-size:1.3rem; font-weight:700; color:var(--mint); margin:2.5rem 0; }\n        .quote-mint    { color:var(--mint); font-style:italic; font-size:1.2rem; font-weight:500; text-align:center; padding:1.5rem 0; line-height:1.65; }\n\n        /* ── CTA section ── */\n        .cta-section {\n            border-radius:1.75rem; border:1px solid rgba(152,255,217,0.20);\n            background:rgba(10,10,10,0.65); padding:4rem 3rem; text-align:center;\n            box-shadow:0 0 70px rgba(152,255,217,0.06);\n        }\n        .cta-section h2 { font-size:clamp(1.75rem,4vw,2.5rem); font-weight:800; color:#fff; letter-spacing:-0.02em; margin-bottom:1.5rem; line-height:1.15; }\n        .cta-body { color:var(--zinc-400); font-size:1.1rem; line-height:1.8; max-width:36rem; margin:0 auto 2.5rem; }\n        .cta-body p + p { margin-top:1rem; }\n        .cta-fine { color:var(--zinc-500); font-size:0.85rem; letter-spacing:0.05em; margin-top:1rem; }\n\n        /* ── Footer ── */\n        footer { border-top:1px solid rgba(255,255,255,0.05); padding:2.5rem 1.5rem; }\n        .footer-inner { max-width:48rem; margin:0 auto; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:1rem; }\n        .footer-logo { display:flex; align-items:center; gap:0.75rem; color:var(--mint); }\n        .footer-logo img { width:1.75rem; height:1.75rem; }\n        .footer-copy { color:var(--zinc-600); font-size:0.75rem; letter-spacing:0.05em; }\n        .footer-copy a:hover { color:var(--zinc-400); }\n\n        /* ── Flowchart ── */\n        .flowchart-wrap {\n            background:var(--card-bg); backdrop-filter:blur(12px); border:1px solid rgba(255,255,255,0.05);\n            border-radius:1.5rem; padding:2rem; overflow-x:auto;\n        }\n font-size:0.65rem; text-transform:uppercase; letter-spacing:0.1em; text-decoration:underline; text-underline-offset:3px; margin-bottom:0.5rem; }\n        .fc-outcome-box { font-size:0.6rem; color:var(--zinc-500); font-style:italic; padding:0.75rem; border-radius:0.5rem; text-align:center; width:100%; }\n        .fc-prophecy {\n            margin-top:3rem; padding:0.875rem 1.5rem; background:rgba(9,9,11,0.5);\n            border-radius:9999px; border:1px solid rgba(255,255,255,0.05);\n            font-size:0.6rem; font-weight:700; letter-spacing:0.15em; color:var(--zinc-600);\n            text-transform:uppercase; display:flex; align-items:center; gap:1rem;\n        }\n        .pulse-dot { width:0.5rem; height:0.5rem; border-radius:50%; background:#3f3f46; animation:pulse 2s cubic-bezier(0.4,0,0.6,1) infinite; }\n        .fc-citation { text-align:right; font-size:0.6rem; color:var(--zinc-500); font-style:italic; margin-top:0.75rem; }\n        @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }\n\n        /* ── Zone carousel ── */\n        .zone-section { position:relative; height:180vh; z-index:10; margin:2.5rem 0 0; }\n        .zone-sticky { position:sticky; top:5.5rem; width:100%; }\n        .zone-layout { width:100%; }\n        .zone-nav { display:none; }\n        .regulator-dot {\n            width:10px; height:10px; border-radius:50%; background:rgba(255,255,255,0.2);\n            transition:all 0.3s ease; cursor:pointer; flex-shrink:0;\n        }\n        .regulator-dot.active { background:var(--mint); transform:scale(1.5); box-shadow:0 0 10px rgba(152,255,217,0.5); }\n        .regulator-line { width:2px; height:70px; background:rgba(255,255,255,0.1); }\n        .zone-carousel-container { display:flex; flex-direction:column; gap:1.5rem; width:100%; }\n        .zone-card { position:static; width:100%; }\n        \n        .zone-badge { display:inline-block; padding:0.2rem 0.75rem; border-radius:9999px; font-size:0.6rem; font-weight:700; letter-spacing:0.1em; }\n        .zone-bullets { display:grid; grid-template-columns:1fr 1fr; gap:0.5rem; list-style:disc; padding-left:1rem; font-size:0.8rem; color:var(--zinc-400); }\n        .zone-bullets li { margin:0; }\n        .zone-detail { padding:1rem; background:rgba(9,9,11,0.5); border-radius:1rem; border:1px solid rgba(255,255,255,0.05); font-size:0.85rem; color:var(--zinc-400); line-height:1.6; }\n        .zone-reveals { font-size:0.65rem; font-weight:900; letter-spacing:0.12em; text-transform:uppercase; padding-top:1rem; border-top:1px solid rgba(255,255,255,0.07); }\n\n        /* ── Story grid (Why I know this) ── */\n        .story-grid { display:grid; grid-template-columns:1fr 1fr; gap:1.25rem; margin:0 auto 2rem; align-items:stretch; max-width:42rem; }\n        .story-grid .card { padding:1rem; font-size:0.92rem; line-height:1.55; }\n        .story-grid .card p + p { margin-top:0.5rem; }\n        .story-photo { border-radius:1.5rem; overflow:hidden; border:1px solid rgba(255,255,255,0.08); background:rgba(9,9,11,0.4); padding:0.5rem; }\n        .story-photo img { width:100%; height:100%; object-fit:cover; border-radius:1rem; opacity:0.9; display:block; }\n        @media (max-width:640px) { .story-grid { grid-template-columns:1fr; } }\n\n        /* ── Mobile ── */\n        @media (max-width:640px) {\n            .nav { padding:1rem 1.25rem; }\n            .card, .card-mint-stat { padding:1.5rem; }\n            .cta-section { padding:2.5rem 1.5rem; }\n            .callout-white { font-size:1.3rem; }\n            .glow-orb { filter:blur(90px); }\n            .orb-1 { width:80vw; height:80vw; }\n            .orb-2 { width:90vw; height:90vw; }\n            .orb-3 { width:70vw; height:70vw; }\n            .fc-fork { gap:0.5rem; }\n        }\n    <\u002Fstyle>\n<\u002Fhead>\n\n<body>\n\n    <div class=\"glow-bg\">\n        <div class=\"glow-orb orb-1\"><\u002Fdiv>\n        <div class=\"glow-orb orb-2\"><\u002Fdiv>\n        <div class=\"glow-orb orb-3\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"grain-overlay\"><\u002Fdiv>\n\n    <!-- Nav -->\n    <nav class=\"nav\">\n        <a href=\"https://limitlesspotentia.fit\" class=\"nav-logo\">\n            <img src=\"a8792adc-b38c-4ff0-a697-da24d530bd44\" alt=\"Limitless Potentia logo\">\n            <div class=\"brand-text\">\n                <span class=\"top\">LIMITLESS<\u002Fspan>\n                <span class=\"bot\">POTENTIA<\u002Fspan>\n            <\u002Fdiv>\n        <\u002Fa>\n        <a href=\"https://cal.com/aankitm/15mins\" target=\"_blank\" rel=\"noopener\" class=\"btn-primary\">Book Your Audit<\u002Fa>\n    <\u002Fnav>\n\n    <!-- Hero -->\n    <section class=\"hero\">\n        <div class=\"hero-icon\">\n            <img src=\"a8792adc-b38c-4ff0-a697-da24d530bd44\" alt=\"Limitless Potentia\">\n        <\u002Fdiv>\n        <h1>The Cost of Handling<br><em>Pressure Well<\u002Fem><\u002Fh1>\n        <p class=\"subtitle\">What high performers normalise that's quietly compounding.<\u002Fp>\n        <div class=\"scroll-arrow\">\n            <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n                <line x1=\"12\" y1=\"5\" x2=\"12\" y2=\"19\"><\u002Fline>\n                <polyline points=\"19 12 12 19 5 12\"><\u002Fpolyline>\n            <\u002Fsvg>\n        <\u002Fdiv>\n    <\u002Fsection>\n\n    <main class=\"content\">\n\n        <!-- ── 1. Before you read this ── -->\n        <section class=\"content-section\">\n            <div class=\"body-copy\">\n                <p><strong class=\"em-white\">You handle pressure well. You always have.<\u002Fstrong><\u002Fp>\n                <p>Most people fold under the conditions you operate in daily. You don't. That's why you're where you are.<\u002Fp>\n                <p>The question isn't whether you can handle it.<\u002Fp>\n            <\u002Fdiv>\n            <div class=\"card-red\">\n                <p>The question is what handling it this way is <span class=\"red-em\">actually costing you.<\u002Fspan><\u002Fp>\n            <\u002Fdiv>\n        <\u002Fsection>\n\n        <!-- ── 2. The variance nobody talks about ── -->\n        <section class=\"content-section\">\n            <span class=\"section-tag\">The variance nobody talks about<\u002Fspan>\n            <div class=\"body-copy\">\n                <p>Watch yourself across a working week. Same role. Same workload. Same team. Same skills.<\u002Fp>\n                <p>Some days everything moves. Decisions are clean. Conversations are sharp. The work feels frictionless.<\u002Fp>\n                <p>Other days the same person can't reach what came easily yesterday. Every task gets harder. Decisions take three times longer. Conversations cost more energy than they should. The deal you closed doesn't land, not frustrated, not relieved, just blank.<\u002Fp>\n                <p>You've probably stopped trying to explain it. Founders absorb it as the cost of the role. The week is just A-days and B-days now.<\u002Fp>\n            <\u002Fdiv>\n\n            <div class=\"card-mint-stat\">\n                <p>When I tracked it, <span class=\"mint\">20+ hours a week<\u002Fspan> disappearing into forced effort. Half a working week, gone, every week. Not into anything that compounds.<\u002Fp>\n            <\u002Fdiv>\n\n            <div class=\"body-copy\">\n                <p>You've got more output, more revenue, more team than you had two years ago. You also have more days where you can't access the version of yourself who built this.<\u002Fp>\n                <p>The structure you built to hold yourself together stopped being the tool. It became the floor.<\u002Fp>\n            <\u002Fdiv>\n        <\u002Fsection>\n\n        <!-- ── 3. The mopping problem ── -->\n        <section class=\"content-section\">\n            <span class=\"section-tag\">The mopping problem<\u002Fspan>\n\n            <div class=\"card-diagram\">\n                <div class=\"diagram-cols\">\n                    <div class=\"diagram-col\">\n                        <div class=\"diagram-dot\" style=\"background:#ff4d4d; box-shadow:0 0 10px rgba(255,77,77,0.5);\"><\u002Fdiv>\n                        <div class=\"diagram-line\" style=\"background:rgba(255,77,77,0.3);\"><\u002Fdiv>\n                        <div class=\"diagram-label\" style=\"color:#ff6b6b;\">Pipe Leaking<\u002Fdiv>\n                    <\u002Fdiv>\n                    <div class=\"diagram-col\" style=\"border-left:1px solid rgba(255,255,255,0.05);\">\n                        <div class=\"diagram-dot\" style=\"background:#98FFD9; box-shadow:0 0 10px rgba(152,255,217,0.5);\"><\u002Fdiv>\n                        <div class=\"diagram-line\" style=\"background:rgba(152,255,217,0.3);\"><\u002Fdiv>\n                        <div class=\"diagram-label\" style=\"color:#98FFD9;\">Mopping the Floor<\u002Fdiv>\n                    <\u002Fdiv>\n                <\u002Fdiv>\n                <div class=\"diagram-caption\">Same problem. Wrong layer.<\u002Fdiv>\n            <\u002Fdiv>\n\n            <div class=\"body-copy\">\n                <p>B-days aren't the problem. They're what shows up on the surface when something underneath isn't working.<\u002Fp>\n                <p>Think of it like a leaking pipe inside a wall. Water keeps appearing on the floor.<\u002Fp>\n                <p>You mop. You buy a better mop. You wake up earlier to mop. You discipline yourself to be more consistent. Some days the floor stays dry. Other days the water keeps coming.<\u002Fp>\n                <p>You think you have a mopping problem.<\u002Fp>\n            <\u002Fdiv>\n\n            <div class=\"callout-white\">You have a pipe problem.<\u002Fdiv>\n\n            <div class=\"body-copy\">\n                <p>Everything you've tried, better systems, sharper habits, tighter routines, mindset work, that's mopping. It operates on the floor. The symptom. It works for a stretch, until the pipe leaks again.<\u002Fp>\n            <\u002Fdiv>\n        <\u002Fsection>\n\n        <!-- ── FLOWCHART ── -->\n        <section class=\"content-section\">\n            <div class=\"body-copy\" style=\"margin-bottom:2rem;\">\n                <p>Here's what the pipe actually is, the calculation your brain runs on every situation before you consciously think anything:<\u002Fp>\n            <\u002Fdiv>\n\n            <div class=\"flowchart-wrap\">\n                <div class=\"fc-inner\">\n                    <div style=\"font-size:0.65rem; font-weight:900; letter-spacing:0.2em; text-transform:uppercase; color:var(--mint); margin-bottom:2rem; text-align:center;\">How Your Brain Decides: Threat vs Challenge<\u002Fdiv>\n\n                    <div class=\"chart-box\">SITUATION OCCURS<div class=\"sub\">Quarterly miss, team conflict, market shift<\u002Fdiv><\u002Fdiv>\n                    <div class=\"connector\"><\u002Fdiv><div class=\"arrow-head\"><\u002Fdiv>\n\n                    <div class=\"chart-box\">APPRAISAL SYSTEM ACTIVATES<\u002Fdiv>\n                    <div class=\"connector\"><\u002Fdiv><div class=\"arrow-head\"><\u002Fdiv>\n\n                    <!-- Primary Appraisal with NO exit -->\n                    <div style=\"position:relative; display:flex; flex-direction:column; align-items:center; width:100%; max-width:300px;\">\n                        <div class=\"chart-box\" style=\"position:relative; width:100%;\">\n                            PRIMARY APPRAISAL\n                            <div class=\"sub\">\"Does this matter to me?\"<\u002Fdiv>\n                            <!-- NO exit -->\n                            <div style=\"position:absolute; top:50%; left:100%; transform:translateY(-50%); display:flex; align-items:center; z-index:10;\">\n                                <div style=\"width:1.5rem; height:2px; background:rgba(255,255,255,0.1); flex-shrink:0;\"><\u002Fdiv>\n                                <div style=\"font-size:0.55rem; color:var(--zinc-500); padding:0 6px; font-weight:700; letter-spacing:0.1em; flex-shrink:0;\">NO<\u002Fdiv>\n                                <div class=\"chart-box\" style=\"opacity:0.6; font-size:0.6rem; text-align:left; white-space:nowrap; padding:8px; width:auto; max-width:none;\">NO STRESS<br><span style=\"font-weight:400; color:var(--zinc-400);\">(Irrelevant)<\u002Fspan><\u002Fdiv>\n                            <\u002Fdiv>\n                        <\u002Fdiv>\n                    <\u002Fdiv>\n\n                    <div class=\"connector\"><\u002Fdiv>\n                    <div style=\"font-size:0.6rem; color:var(--mint); font-weight:700; padding:3px 0;\">YES<\u002Fdiv>\n                    <div class=\"arrow-head\"><\u002Fdiv>\n\n                    <div class=\"chart-box glow-mint\" style=\"border-color:rgba(152,255,217,0.4);\">\n                        SECONDARY APPRAISAL\n                        <div class=\"sub\">\"Do I have resources to handle it?\"<\u002Fdiv>\n                    <\u002Fdiv>\n\n                    <!-- Fork connector -->\n                    <div style=\"width:2px; height:1rem; background:rgba(255,255,255,0.1); margin:0 auto;\"><\u002Fdiv>\n\n                    <!-- Two-column fork -->\n                    <div class=\"fc-fork\">\n                        <!-- Red / Threat branch -->\n                        <div class=\"fc-branch\">\n                            <div class=\"fc-hline\" style=\"right:-0.25rem; width:calc(50% + 0.25rem);\"><\u002Fdiv>\n                            <div style=\"width:2px; height:2rem; background:rgba(255,255,255,0.1); position:relative;\">\n                                <div style=\"position:absolute; left:100%; top:50%; transform:translateY(-50%); padding-left:4px; font-size:0.55rem; color:var(--red); font-weight:700; white-space:nowrap;\">No<\u002Fdiv>\n                            <\u002Fdiv>\n                            <div class=\"arrow-head\" style=\"margin-bottom:0.5rem;\"><\u002Fdiv>\n                            <div class=\"chart-box glow-red\" style=\"color:var(--red); text-transform:uppercase; width:100%; max-width:none;\">Threat Response<\u002Fdiv>\n                            <div class=\"connector red\"><\u002Fdiv>\n                            <div class=\"biology-card red\" style=\"width:100%;\">\n                                <div class=\"bio-title\" style=\"color:var(--red); text-decoration-color:rgba(255,77,77,0.3);\">Biology B<\u002Fdiv>\n                                <ul>\n                                    <li>Amygdala hijacks<\u002Fli>\n                                    <li>Cortisol = poison<\u002Fli>\n                                    <li>Energy <span style=\"color:var(--red); font-weight:700;\">↓<\u002Fspan><\u002Fli>\n                                    <li>Panic, scattered focus<\u002Fli>\n                                    <li>Performance collapses<\u002Fli>\n                                <\u002Ful>\n                            <\u002Fdiv>\n                            <div class=\"connector red\"><\u002Fdiv>\n                            <div class=\"chart-box\" style=\"border-color:rgba(255,77,77,0.3); font-size:0.6rem; text-transform:uppercase; width:100%; max-width:none;\">Survival Mindset<\u002Fdiv>\n                            <div class=\"connector red\"><\u002Fdiv>\n                            <div class=\"fc-outcome-box\" style=\"border:1px solid rgba(255,77,77,0.2);\">Reinforces:<br>\"I can't handle this\"<\u002Fdiv>\n                        <\u002Fdiv>\n\n                        <!-- Mint / Challenge branch -->\n                        <div class=\"fc-branch\">\n                            <div class=\"fc-hline\" style=\"left:-0.25rem; width:calc(50% + 0.25rem);\"><\u002Fdiv>\n                            <div style=\"width:2px; height:2rem; background:rgba(255,255,255,0.1); position:relative;\">\n                                <div style=\"position:absolute; right:100%; top:50%; transform:translateY(-50%); padding-right:4px; font-size:0.55rem; color:var(--mint); font-weight:700; white-space:nowrap;\">Yes<\u002Fdiv>\n                            <\u002Fdiv>\n                            <div class=\"arrow-head\" style=\"margin-bottom:0.5rem;\"><\u002Fdiv>\n                            <div class=\"chart-box glow-mint\" style=\"color:var(--mint); text-transform:uppercase; width:100%; max-width:none;\">Challenge Response<\u002Fdiv>\n                            <div class=\"connector mint\"><\u002Fdiv>\n                            <div class=\"biology-card mint\" style=\"width:100%;\">\n                                <div class=\"bio-title\" style=\"color:var(--mint); text-decoration-color:rgba(152,255,217,0.3);\">Biology A<\u002Fdiv>\n                                <ul>\n                                    <li>Prefrontal cortex in control<\u002Fli>\n                                    <li>Cortisol = fuel<\u002Fli>\n                                    <li>Energy <span style=\"color:var(--mint); font-weight:700;\">↑<\u002Fspan><\u002Fli>\n                                    <li>Focus sharp<\u002Fli>\n                                    <li>Performance improves<\u002Fli>\n                                <\u002Ful>\n                            <\u002Fdiv>\n                            <div class=\"connector mint\"><\u002Fdiv>\n                            <div class=\"chart-box glow-mint\" style=\"border-color:rgba(152,255,217,0.3); font-size:0.6rem; text-transform:uppercase; width:100%; max-width:none; color:var(--mint);\">Growth Mindset<\u002Fdiv>\n                            <div class=\"connector mint\"><\u002Fdiv>\n                            <div class=\"fc-outcome-box\" style=\"border:1px solid rgba(152,255,217,0.2); color:#fff; font-weight:500;\">Reinforces:<br>\"I can handle this\"<\u002Fdiv>\n                        <\u002Fdiv>\n                    <\u002Fdiv>\n\n                    <div class=\"fc-prophecy\">\n                        <div class=\"pulse-dot\"><\u002Fdiv>\n                        Self-Fulfilling Prophecy Loop\n                        <div class=\"pulse-dot\"><\u002Fdiv>\n                    <\u002Fdiv>\n                <\u002Fdiv>\n                <div class=\"fc-citation\">Lazarus &amp; Folkman (1984) — Cognitive appraisal model<\u002Fdiv>\n            <\u002Fdiv>\n\n            <div class=\"body-copy\" style=\"margin-top:2rem;\">\n                <p>When that secondary appraisal comes back as threat, the whole system shifts. That's what a B-day is. Not a discipline failure. A miscalibrated calculation running a different biology.<\u002Fp>\n            <\u002Fdiv>\n        <\u002Fsection>\n\n        <!-- ── 4. Why I know this ── -->\n        <section class=\"content-section\">\n            <span class=\"section-tag\">Why I know this<\u002Fspan>\n            <div class=\"story-grid\">\n                <div class=\"card body-copy\">\n                    <p>I went through this loop twice.<\u002Fp>\n                    <p style=\"margin-top:1.25rem;\">The first time I had no idea what was happening. I just kept mopping harder.<\u002Fp>\n                    <p style=\"margin-top:1.25rem;\">The second time, I went through it with all the knowledge. I'd read everything. Understood the neuroscience. Could name the pattern in real time as it ran. And still couldn't stop it.<\u002Fp>\n                    <p style=\"margin-top:1.25rem;\">Sitting there with every framework I'd accumulated and not being able to use any of it, that's when I understood. The loop doesn't care what you know. It only responds to what you've actually worked through at the layer it lives at.<\u002Fp>\n                <\u002Fdiv>\n                <div class=\"story-photo\">\n                    <img src=\"814c6017-3b8c-4b78-b259-75b18fa4b929\" alt=\"Ankit, Founder of Limitless Potentia\">\n                <\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"quote-mint\">\"You can't think your way out of a system built out of thinking.\"<\u002Fdiv>\n        <\u002Fsection>\n\n        <!-- ── 5. What the work actually is ── -->\n        <section class=\"content-section\">\n            <span class=\"section-tag\">What the work actually is<\u002Fspan>\n            <div class=\"body-copy\">\n                <p>Underneath everything you do, your system is running a fast calculation: <span class=\"em-white\">do I have what I need to handle this?<\u002Fspan> On A-days, the answer comes back yes, you mobilise cleanly, full focus, full presence. On B-days, the calculation comes back differently. Part of you is on the task. Part of you is managing internal friction.<\u002Fp>\n                <p style=\"margin-top:1.5rem;\">You're not running on weaker willpower on B-days. You're running through more friction with the same engine.<\u002Fp>\n            <\u002Fdiv>\n\n            <div class=\"body-copy\" style=\"margin-top:2rem;\">\n                <p>Your system operates across three zones based on this calculation. Each one is telling you something specific:<\u002Fp>\n            <\u002Fdiv>\n\n            <!-- Three Zones -->\n            <div style=\"position:relative; margin:2.5rem 0;\" id=\"zone-scroll-container\">\n                <div>\n                    <div class=\"zone-layout\">\n                        <!-- Dot nav -->\n                        <div class=\"zone-nav\" id=\"zone-nav\">\n                            <div class=\"regulator-dot active\" onclick=\"updateZones(0)\"><\u002Fdiv>\n                            <div class=\"regulator-line\"><\u002Fdiv>\n                            <div class=\"regulator-dot\" onclick=\"updateZones(1)\"><\u002Fdiv>\n                            <div class=\"regulator-line\"><\u002Fdiv>\n                            <div class=\"regulator-dot\" onclick=\"updateZones(2)\"><\u002Fdiv>\n                        <\u002Fdiv>\n\n                        <!-- Cards -->\n                        <div class=\"zone-carousel-container\">\n\n                            <!-- Zone 1: Underload -->\n                            <div class=\"zone-card card\" style=\"border-color:rgba(96,165,250,0.2);\" data-state=\"active\">\n                                <div style=\"display:flex; align-items:center; gap:0.75rem; margin-bottom:1.25rem; flex-wrap:wrap;\">\n                                    <div style=\"font-weight:900; letter-spacing:0.1em; text-transform:uppercase; color:#60a5fa;\">Underload<\u002Fdiv>\n                                    <div class=\"zone-badge\" style=\"background:rgba(96,165,250,0.1); color:#60a5fa;\">PR &gt;&gt; PT<\u002Fdiv>\n                                <\u002Fdiv>\n                                <p style=\"color:var(--zinc-300); font-style:italic; font-size:0.9rem; line-height:1.6; margin-bottom:1.25rem;\">Resources far exceed demand. System feels flat, under-stimulated. This is where your brain is <strong style=\"color:#60a5fa;\">most creative<\u002Fstrong>.<\u002Fp>\n                                <ul class=\"zone-bullets\" style=\"margin-bottom:1.25rem;\">\n                                    <li>Broad perception<\u002Fli>\n                                    <li>Open pattern recognition<\u002Fli>\n                                    <li>Novel connections<\u002Fli>\n                                    <li>Long-range strategic thinking<\u002Fli>\n                                <\u002Ful>\n                                <div class=\"zone-detail\" style=\"margin-bottom:1.25rem;\">\n                                    <p>It's why the best ideas come in the shower, on a walk, at 6am before the noise starts.<\u002Fp>\n                                <\u002Fdiv>\n                                <div class=\"zone-reveals\">\n                                    <span style=\"color:#fff;\">Reveals:<\u002Fspan> <span style=\"color:var(--zinc-500);\">Your current creative and strategic ceiling, what your system can generate when it's not in resource-protection mode.<\u002Fspan>\n                                <\u002Fdiv>\n                            <\u002Fdiv>\n\n                            <!-- Zone 2: Challenge -->\n                            <div class=\"zone-card card\" style=\"border-color:rgba(152,255,217,0.2);\" data-state=\"next\">\n                                <div style=\"display:flex; align-items:center; gap:0.75rem; margin-bottom:1.25rem; flex-wrap:wrap;\">\n                                    <div style=\"font-weight:900; letter-spacing:0.1em; text-transform:uppercase; color:var(--mint);\">Challenge Zone<\u002Fdiv>\n                                    <div class=\"zone-badge\" style=\"background:rgba(152,255,217,0.1); color:var(--mint);\">PR ≈ PT<\u002Fdiv>\n                                <\u002Fdiv>\n                                <p style=\"color:var(--zinc-300); font-style:italic; font-size:0.9rem; line-height:1.6; margin-bottom:1.25rem;\">High demand, stable perception. The nervous system mobilises fully. This is where your brain is <strong style=\"color:var(--mint);\">most competitive<\u002Fstrong>.<\u002Fp>\n                                <ul class=\"zone-bullets\" style=\"margin-bottom:1.25rem;\">\n                                    <li>Focus sharpens<\u002Fli>\n                                    <li>Energy moves<\u002Fli>\n                                    <li>Decisions are clean<\u002Fli>\n                                    <li>No bandwidth split<\u002Fli>\n                                <\u002Ful>\n                                <div class=\"zone-detail\" style=\"margin-bottom:1.25rem;\">\n                                    <p style=\"color:#fff; font-weight:500; margin-bottom:0.5rem;\">Executing strategy. Using pattern libraries. Pushing hard. Getting fast feedback.<\u002Fp>\n                                    <p>Elite operators engineer this state, not through willpower, through calibration.<\u002Fp>\n                                <\u002Fdiv>\n                                <div class=\"zone-reveals\">\n                                    <span style=\"color:#fff;\">Reveals:<\u002Fspan> <span style=\"color:var(--zinc-500);\">Your current performance tolerance, the ceiling you can operate at cleanly right now.<\u002Fspan>\n                                <\u002Fdiv>\n                            <\u002Fdiv>\n\n                            <!-- Zone 3: Overload -->\n                            <div class=\"zone-card card\" style=\"border-color:rgba(255,77,77,0.2);\" data-state=\"prev\">\n                                <div style=\"display:flex; align-items:center; gap:0.75rem; margin-bottom:1.25rem; flex-wrap:wrap;\">\n                                    <div style=\"font-weight:900; letter-spacing:0.1em; text-transform:uppercase; color:var(--red);\">Overload / Protection<\u002Fdiv>\n                                    <div class=\"zone-badge\" style=\"background:rgba(255,77,77,0.1); color:var(--red);\">PT &gt; PR<\u002Fdiv>\n                                <\u002Fdiv>\n                                <p style=\"color:var(--zinc-300); font-style:italic; font-size:0.9rem; line-height:1.6; margin-bottom:1.25rem;\">This is where <strong style=\"color:var(--red);\">all internal friction<\u002Fstrong> lives. The system shifts priority from the task to personal protection.<\u002Fp>\n                                <ul class=\"zone-bullets\" style=\"margin-bottom:1.25rem;\">\n                                    <li>Brain-fog &amp; heaviness<\u002Fli>\n                                    <li>Second-guessing<\u002Fli>\n                                    <li>Perception narrows<\u002Fli>\n                                    <li>Stress doesn't fully dissipate<\u002Fli>\n                                <\u002Ful>\n                                <div class=\"zone-detail\" style=\"margin-bottom:1.25rem;\">\n                                    <p>You default to proven patterns over optimal solutions. Decisions speed up but lose depth.<\u002Fp>\n                                    <p style=\"margin-top:0.5rem; color:#fff; font-weight:500;\">You're still executing, but part of your bandwidth has been split away from the task and redirected to managing the internal threat.<\u002Fp>\n                                <\u002Fdiv>\n                                <div class=\"zone-reveals\">\n                                    <span style=\"color:#fff;\">Reveals:<\u002Fspan> <span style=\"color:var(--zinc-500);\">Exactly where your bandwidth is leaking, which demands consume more resources than the task warrants.<\u002Fspan>\n                                <\u002Fdiv>\n                            <\u002Fdiv>\n\n                        <\u002Fdiv>\n                    <\u002Fdiv>\n                <\u002Fdiv>\n            <\u002Fdiv>\n\n            <div class=\"body-copy\" style=\"margin-top:1.5rem;\">\n                <p>When I mapped my own pattern, the protection zone was where most of my week was going. I'd normalised it. The audit maps exactly where you are, and what's pulling you there.<\u002Fp>\n            <\u002Fdiv>\n        <\u002Fsection>\n\n        <!-- ── Final CTA ── -->\n        <section class=\"cta-section\">\n            <h2>If you've observed this loop<\u002Fh2>\n            <div class=\"cta-body\">\n                <p>I'm running 45-minute audits with a few founders this month. Not a discovery call.<\u002Fp>\n                <p>We map what's actually running underneath your B-days, your specific triggers, where the energy is leaking, what your system is actually responding to. You'll leave with an articulation of what's been happening that you couldn't name before.<\u002Fp>\n            <\u002Fdiv>\n            <a href=\"https://cal.com/aankitm/15mins\" target=\"_blank\" rel=\"noopener\" class=\"btn-primary btn-lg\">Book Your Audit<\u002Fa>\n        <\u002Fsection>\n\n    <\u002Fmain>\n\n    <!-- Footer -->\n    <footer>\n        <div class=\"footer-inner\">\n            <a href=\"https://limitlesspotentia.fit\" class=\"footer-logo\">\n                <img src=\"a8792adc-b38c-4ff0-a697-da24d530bd44\" alt=\"Limitless Potentia logo\">\n                <div class=\"brand-text\">\n                    <span class=\"top\">LIMITLESS<\u002Fspan>\n                    <span class=\"bot\">POTENTIA<\u002Fspan>\n                <\u002Fdiv>\n            <\u002Fa>\n            <p class=\"footer-copy\">\n                © Limitless Potentia &nbsp;·&nbsp;\n                <a href=\"https://limitlesspotentia.fit\">limitlesspotentia.fit<\u002Fa>\n            <\u002Fp>\n        <\u002Fdiv>\n    <\u002Ffooter>\n\n    <script>\n        var currentZoneIndex = 0;\n\n        window.updateZones = function(index) {\n            currentZoneIndex = index;\n            document.querySelectorAll('.zone-card').forEach(function(card, i) {\n                if (i < index)            card.dataset.state = 'prev';\n                else if (i === index)      card.dataset.state = 'active';\n                else if (i === index + 1)  card.dataset.state = 'next';\n                else                       card.dataset.state = 'prev';\n            });\n            document.querySelectorAll('.regulator-dot').forEach(function(dot, i) {\n                dot.classList.toggle('active', i === index);\n            });\n        };\n\n        document.addEventListener('DOMContentLoaded', function() {\n            updateZones(0);\n        });\n    <\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
